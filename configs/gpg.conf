# =============================================================
# GPG Configuration — Paranoid Mode
# Copy to ~/.gnupg/gpg.conf on Tails (done by 01-tails-setup.sh)
# =============================================================

# --- Cipher preferences ---
# AES256 is a 256-bit symmetric cipher — the gold standard for encrypting data at rest.
# AES192 and AES128 are fallbacks if the recipient's key doesn't support AES256.
# Ordering matters: GPG picks the first algorithm both parties support, so put the
# strongest one first. 3DES and other legacy ciphers are intentionally omitted.
personal-cipher-preferences AES256 AES192 AES

# --- Digest (hash) preferences ---
# SHA512 produces a 512-bit hash — used to sign and verify data integrity.
# Stronger hashes make it harder to forge signatures or find collisions.
# SHA1 and MD5 are completely omitted — both are cryptographically broken.
personal-digest-preferences SHA512 SHA384 SHA256

# --- Compression preferences ---
# Compression is applied before encryption. ZLIB and BZIP2 are generally fine.
# "Uncompressed" is listed last so GPG can still talk to minimal implementations.
# Note: for very sensitive short messages, compression can theoretically leak
# information about plaintext length — but this is rarely a practical concern.
personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed

# --- Default preference list advertised in your key ---
# When you generate or update your key, GPG embeds a preference list in it.
# Other people's GPG uses this list to decide which algorithms to use when
# encrypting to you. This list says: prefer SHA512 hashes, AES256 encryption,
# and ZLIB compression when messaging this key's owner.
default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB BZIP2 ZIP Uncompressed

# --- Certificate digest algorithm ---
# This is the hash algorithm used when you sign someone else's key (key signing / WoT).
# SHA512 ensures the certification signature itself is strongly bound to both keys.
cert-digest-algo SHA512

# --- String-to-key (passphrase) digest algorithm ---
# When GPG converts your passphrase into an encryption key for your secret key file,
# it uses this hash algorithm. SHA512 slows down brute-force attacks on your passphrase.
s2k-digest-algo SHA512

# --- String-to-key cipher algorithm ---
# The symmetric cipher used to encrypt your private key on disk, protected by your
# passphrase. AES256 is the strongest option GPG supports.
s2k-cipher-algo AES256

# --- Key ID display format ---
# "0xlong" shows the full 64-bit key ID (e.g., 0xDEADBEEFCAFEBABE).
# Short 32-bit key IDs were trivially forgeable — two different keys could share the
# same short ID. Always use long or full fingerprint to identify keys unambiguously.
keyid-format 0xlong

# --- Always show fingerprint when listing keys ---
# The full 160-bit fingerprint (40 hex characters) is the only truly unique identifier
# for a GPG key. Showing it by default prevents you from accidentally relying on
# shorter, potentially colliding identifiers.
with-fingerprint

# --- Show keygrip when listing keys ---
# The keygrip is an internal identifier used by gpg-agent to reference keys in its
# key store. Showing it is useful when debugging agent issues or managing subkeys.
with-keygrip

# --- Strip comments from output ---
# By default GPG may include a "Comment:" header in ASCII-armored output.
# Suppressing it leaks less metadata about your GPG version and setup.
no-comments

# --- Strip version header from output ---
# By default GPG writes "Version: GnuPG v..." into armored output.
# Omitting it reveals less about your software version to potential adversaries.
no-emit-version

# --- Show trust/validity when listing UIDs ---
# Displays whether each User ID on a key is valid, marginally trusted, fully trusted,
# or untrusted. Makes it clear at a glance whether you've verified a key's ownership.
list-options show-uid-validity

# --- Show trust/validity when verifying signatures ---
# Same as above, but applied during signature verification. You'll see whether the
# signing key is trusted in your web of trust, which helps catch impersonation.
verify-options show-uid-validity

# --- Disable automatic key location / retrieval ---
# Without this, GPG may attempt to automatically fetch keys from key servers
# when it encounters an unknown key ID. This creates a network fingerprint
# (revealing what keys you're interacting with) and can introduce untrusted keys.
# On Tails/air-gapped systems, you always want manual, deliberate key management.
no-auto-key-locate

# --- Force UTF-8 character encoding ---
# Ensures names and email addresses in User IDs are interpreted as UTF-8.
# Prevents encoding mismatches that could cause display corruption or subtle bugs.
charset utf-8

# --- Use fixed-width columns when listing keys ---
# Makes machine-parsing and scripting output easier and more predictable.
# Human readability is slightly reduced, but consistency is worth it for automation.
fixed-list-mode
