# =============================================================
# GPG Agent Configuration — macOS + Linux
# =============================================================
# Install location:
#   macOS:  ~/.gnupg/gpg-agent.conf
#   Linux:  ~/.gnupg/gpg-agent.conf
#
# After placing this file, restart the agent:
#   gpgconf --kill gpg-agent && gpgconf --launch gpg-agent
# =============================================================

# --- SSH support ---
# Tells gpg-agent to also act as an SSH agent, replacing the system's ssh-agent.
# When this is enabled, your GPG authentication subkey (stored on a YubiKey) can
# be used for SSH logins — no separate SSH key needed. The agent exposes a socket
# that SSH clients connect to, exactly like a normal ssh-agent, but authentication
# is handled by GPG and the YubiKey's secure element instead of a plaintext key file.
enable-ssh-support

# --- Passphrase cache TTL for GPG operations ---
# After you enter your passphrase (or touch your YubiKey), gpg-agent caches it
# so you don't have to re-enter it for every operation.
#
# default-cache-ttl: how long (in seconds) the cache entry stays alive after the
# LAST time it was used. 600 = 10 minutes of inactivity before the cache expires.
#
# max-cache-ttl: the absolute ceiling — regardless of activity, the passphrase is
# flushed after this many seconds. 7200 = 2 hours maximum.
#
# Shorter values are more secure (less window for an attacker with physical access)
# but more annoying. Adjust to your threat model.
default-cache-ttl 600
max-cache-ttl 7200

# --- Passphrase cache TTL for SSH operations ---
# Same semantics as above, but specifically for SSH authentication operations
# routed through gpg-agent. Kept the same as GPG TTLs for consistency.
#
# If you SSH frequently (e.g. multiple servers in a session), bumping
# default-cache-ttl-ssh to 1800 (30 min) reduces YubiKey touch prompts without
# materially changing your risk profile.
default-cache-ttl-ssh 600
max-cache-ttl-ssh 7200

# --- PIN Entry program ---
# Pinentry is the small program gpg-agent spawns to ask you for your passphrase.
# It must be a graphical or terminal program that can securely capture input
# without exposing it to other processes.
#
# Why macOS needs its own variant:
#   The standard Linux pinentry programs don't integrate with macOS's security
#   model and may fail to grab focus or render correctly. pinentry-mac uses the
#   native macOS dialog (or the menu bar, if configured) and correctly handles
#   Secure Input mode, which prevents other apps from keylogging your passphrase.
#
# How to choose:
#   - macOS Apple Silicon (M1/M2/M3): use pinentry-mac at /opt/homebrew/bin/
#   - macOS Intel: Homebrew installs to /usr/local/bin/ instead
#   - Linux with a desktop environment: pinentry-gnome3 or pinentry-qt
#   - Linux headless / terminal-only: pinentry-curses (text-mode prompt)
#
# Install on macOS first: brew install pinentry-mac
# Uncomment the ONE line that matches your system:

# macOS (install first: brew install pinentry-mac)
# pinentry-program /opt/homebrew/bin/pinentry-mac

# macOS Intel (Homebrew on Intel path)
# pinentry-program /usr/local/bin/pinentry-mac

# Linux GNOME
# pinentry-program /usr/bin/pinentry-gnome3

# Linux terminal-only
# pinentry-program /usr/bin/pinentry-curses
